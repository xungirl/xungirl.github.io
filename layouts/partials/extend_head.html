<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<style>
    .footer > span { display: none; }
    .custom-footer { font-family: 'Pacifico', cursive; }
</style>

<!-- Google Translate (hidden widget, controlled programmatically) -->
<div id="google_translate_element" style="display:none;visibility:hidden;height:0;overflow:hidden;position:absolute"></div>
<style>
    /* Suppress the banner bar Google Translate injects at the top */
    .goog-te-banner-frame { display: none !important; }
    .skiptranslate > iframe  { height: 0 !important; visibility: hidden !important; }
    body { top: 0 !important; }

    /* Translate button — matches PaperMod's theme-toggle style */
    #translate-btn {
        cursor: pointer;
        background: transparent;
        border: none;
        padding: 0 4px;
        font-size: 14px;
        font-weight: 600;
        color: var(--primary);
        line-height: 1;
        vertical-align: middle;
    }
    #translate-btn:hover { opacity: 0.65; }
    #translate-sep {
        opacity: 0.3;
        font-size: 14px;
        user-select: none;
        pointer-events: none;
    }
</style>
<script>
    // Detect THIS article's own language by counting Chinese vs Latin characters
    // in the post body. Returns 'zh-CN' for a Chinese post, otherwise 'en'.
    function detectPageLang() {
        var body = document.querySelector('.post-content')
                || document.querySelector('article')
                || document.body;
        var text = (body && body.innerText || '').slice(0, 3000);
        var cjk = (text.match(/[一-鿿]/g) || []).length;
        var latin = (text.match(/[A-Za-z]/g) || []).length;
        return cjk > latin ? 'zh-CN' : 'en';
    }

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: detectPageLang(),   // the article's real language
            includedLanguages: 'en,zh-CN',    // allow translating to EITHER direction
            autoDisplay: false
        }, 'google_translate_element');
    }
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
<script>
(function () {
    var translated = false;
    // Translation direction, decided per page (set in injectButton, once body exists)
    var target = 'zh-CN', toLabel = 'Zh', backLabel = 'EN';

    function setupDirection() {
        var pageLang = (typeof detectPageLang === 'function') ? detectPageLang() : 'en';
        target    = pageLang === 'en' ? 'zh-CN' : 'en';   // translate to the OTHER language
        toLabel   = target === 'zh-CN' ? 'Zh' : 'EN';     // label shown before translating
        backLabel = pageLang === 'en' ? 'EN' : 'Zh';      // label shown to restore original
    }

    function applyLang(lang) {
        var combo = document.querySelector('.goog-te-combo');
        if (!combo) return false;
        combo.value = lang;
        combo.dispatchEvent(new Event('change'));
        return true;
    }

    // Protect UI chrome (nav, footer, meta, tags…) — only article body gets translated
    function protectUI() {
        [
            'header.header',
            'footer.footer',
            '.breadcrumbs',
            '.post-meta',
            '.post-tags',
            '#TableOfContents',
            '.paginav',
            '.share-buttons',
            '.social-icons',
        ].forEach(function (sel) {
            document.querySelectorAll(sel).forEach(function (el) {
                el.setAttribute('translate', 'no');
                el.classList.add('notranslate');
            });
        });
    }

    // Protect KaTeX-rendered math nodes (inline + display)
    function protectMath() {
        document.querySelectorAll('.katex, .katex-display').forEach(function (el) {
            el.setAttribute('translate', 'no');
            el.classList.add('notranslate');
        });
    }

    // Protect code from being translated — fenced blocks AND inline `code`
    // (inline code is where most technical terms live)
    function protectCode() {
        document.querySelectorAll('pre, code, .highlight, .chroma').forEach(function (el) {
            el.setAttribute('translate', 'no');
            el.classList.add('notranslate');
        });
    }

    function toggle() {
        translated = !translated;
        document.getElementById('translate-btn').textContent = translated ? backLabel : toLabel;
        if (translated) { protectUI(); protectMath(); protectCode(); }
        if (applyLang(translated ? target : '')) return;
        // Widget not ready yet — retry until it appears
        var attempts = 0;
        var t = setInterval(function () {
            if (translated) { protectUI(); protectMath(); protectCode(); }
            if (applyLang(translated ? target : '') || ++attempts > 30) clearInterval(t);
        }, 200);
    }

    function injectButton() {
        var themeToggle = document.getElementById('theme-toggle');
        if (!themeToggle) return;

        setupDirection();   // body is ready now — decide direction for this page

        var sep = document.createElement('span');
        sep.id = 'translate-sep';
        sep.textContent = ' | ';

        var btn = document.createElement('button');
        btn.id = 'translate-btn';
        btn.textContent = toLabel;
        btn.title = target === 'zh-CN'
            ? 'Translate to Chinese / 翻译成中文'
            : 'Translate to English / 翻译成英文';
        btn.addEventListener('click', toggle);

        themeToggle.parentNode.insertBefore(sep, themeToggle);
        themeToggle.parentNode.insertBefore(btn, sep);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', injectButton);
    } else {
        injectButton();
    }
})();
</script>
