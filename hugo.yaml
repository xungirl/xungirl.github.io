baseURL: "https://xungirl.github.io/"
title: "xun's Blog"
pagination:
  pagerSize: 10
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: monokai

params:
  math: true
  env: production
  description: "Xun's notes on CS, algorithms, and software engineering"
  author: "Jiaju"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowToc: true
  TocOpen: false
  homeInfoParams:
    Title: "Hi there 👋"
    Content: "Welcome to my blog. I write about programming, algorithms, and software engineering."
  socialIcons:
    - name: github
      url: "https://github.com/xungirl"
    - name: email
      url: "mailto:xungirl1024@gmail.com"
    - name: instagram
      url: "https://www.instagram.com/xunxun1314521/"
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: search
      name: Search
      url: /search/
      weight: 1
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 2
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 3
    - identifier: about
      name: About
      url: /about/
      weight: 4

outputs:
  home:
    - HTML
    - RSS
    - JSON
